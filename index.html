<!DOCTYPE html>
<html lang="ja">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream Meanings Global | ルナ・ジャスミンの夢占い</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        :root {
            --primary-purple: #6B4C9A;
            --accent-green: #4CAF50;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --text-color: #333333;
            --bg-light: #F9F7FA;
        }
        
        * { box-sizing: border-box; }
        
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-light);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.7;
        }
        
        header {
            background: var(--bg-gradient);
            color: white;
            text-align: center;
            padding: 30px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        header a {
            color: white;
            text-decoration: none;
            font-size: 2em;
            font-weight: bold;
            cursor: pointer;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
            margin: 10px 0 0 0;
        }
        
        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .section-title {
            text-align: center;
            color: var(--primary-purple);
            font-size: 1.8em;
            margin-bottom: 30px;
            border-bottom: 3px solid var(--accent-green);
            display: inline-block;
            padding-bottom: 10px;
        }

        .articles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }
        
        .article-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            border-top: 4px solid var(--primary-purple);
        }
        
        .article-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
        }
        
        .card-title {
            color: var(--primary-purple);
            font-size: 1.3em;
            margin: 0 0 15px 0;
            font-weight: bold;
            line-height: 1.4;
        }
        
        .card-content {
            color: #555;
            font-size: 0.95em;
            flex-grow: 1;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .card-meta {
            font-size: 0.85em;
            color: #888;
            margin-bottom: 10px;
        }

        .read-more-btn {
            background: var(--bg-gradient);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-size: 0.9em;
            font-weight: bold;
            text-align: center;
            display: inline-block;
            transition: all 0.3s ease;
            box-shadow: 0 3px 10px rgba(0,0,0,0.15);
            cursor: pointer;
        }

        .read-more-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.25);
        }

        /* 詳細ページ用スタイル */
        .article-detail-box {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }

        .article-badge {
            display: inline-block;
            background: var(--bg-gradient);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9em;
            margin-bottom: 15px;
        }

        .detail-title {
            color: var(--primary-purple);
            font-size: 2em;
            margin: 15px 0 15px 0;
            border-bottom: 3px solid var(--accent-green);
            padding-bottom: 15px;
            line-height: 1.3;
        }

        .detail-meta {
            color: #777;
            font-size: 0.95em;
            margin-bottom: 30px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .detail-body {
            font-size: 1.1em;
            line-height: 1.8;
        }

        .detail-body h2 {
            color: var(--primary-purple);
            font-size: 1.4em;
            margin: 35px 0 15px 0;
            border-left: 4px solid var(--accent-green);
            padding-left: 15px;
        }

        .detail-body h3 {
            color: var(--primary-purple);
            font-size: 1.2em;
            margin: 25px 0 12px 0;
        }

        .back-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 24px;
            background: var(--bg-gradient);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: transform 0.2s;
            cursor: pointer;
        }

        .back-btn:hover { transform: translateY(-2px); }

        .related-section {
            margin-top: 50px;
            padding-top: 30px;
            border-top: 2px solid #eee;
        }

        .related-title {
            color: var(--primary-purple);
            font-size: 1.3em;
            margin-bottom: 20px;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: var(--primary-purple);
            font-size: 1.2em;
        }

        .error {
            text-align: center;
            padding: 40px;
            color: #e74c3c;
            background: #fdf2f2;
            border-radius: 8px;
            margin: 20px 0;
        }

        @media (max-width: 768px) {
            .container { padding: 0 15px; }
            .articles-grid { grid-template-columns: 1fr; }
            .article-detail-box { padding: 25px; }
            .detail-title { font-size: 1.5em; }
        }
    </style>
</head>
<body>

<header>
    <a onclick="showHomePage()">🌙 夢占い（Dream Fortune-Telling）</a>
    <p>～占い師ルナ・ジャスミンが解き明かす、あなたの夢のメッセージ～</p>
</header>

<!-- 一覧表示エリア -->
<div id="home-view" class="container">
    <div style="text-align: center;">
        <h2 class="section-title">✨ 最新の夢占いメッセージ</h2>
    </div>
    <div id="latest-articles">
        <div class="loading">🔮 ルナ・ジャスミンが記録を読み込んでいます...</div>
    </div>
</div>

<!-- 詳細表示エリア -->
<div id="article-view" class="container" style="display: none;">
    <div id="article-content-area">
        <div class="loading">✨ 夢のメッセージを解読中...</div>
    </div>
    
    <div class="related-section">
        <h3 class="related-title">🔮 あなたにおすすめの夢占い</h3>
        <div id="related-grid" class="articles-grid"></div>
    </div>
</div>

<script type="module">
    // Supabase設定
    const SUPABASE_URL = 'https://qlxjgjgfdtfhaqkzsghi.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFseGpnamdmZHRmaGFxa3pzZ2hpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2OTg3MjIsImV4cCI6MjA5MDI3NDcyMn0.oNeOZpozQixlqMTGv_YFNqb4z9wcRzj7ibqfLXA-qKo';
    
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // 画面状態管理
    function checkUrlAndShowPage() {
        const urlParams = new URLSearchParams(window.location.search);
        const slug = urlParams.get('slug');

        if (slug) {
            showArticlePage(slug);
        } else {
            showHomePage();
        }
    }

    // ホームページ表示
    window.showHomePage = function() {
        document.getElementById('home-view').style.display = 'block';
        document.getElementById('article-view').style.display = 'none';
        document.title = 'Dream Meanings Global | ルナ・ジャスミンの夢占い';
        window.history.pushState({}, '', window.location.pathname);
        
        if (document.getElementById('latest-articles').innerHTML.includes('読み込んでいます')) {
            loadArticleList();
        }
    };

    // 記事詳細ページ表示
    window.showArticlePage = function(slug) {
        document.getElementById('home-view').style.display = 'none';
        document.getElementById('article-view').style.display = 'block';
        window.history.pushState({slug: slug}, '', `?slug=${encodeURIComponent(slug)}`);
        loadArticleDetail(slug);
    };

    // 記事一覧読み込み
    async function loadArticleList() {
        try {
            console.log('📖 記事一覧を取得中...');
            
            const { data, error } = await supabase
                .from('dream_articles')
                .select('id, full_title, content, slug, published_at')
                .order('published_at', { ascending: false })
                .limit(12);

            if (error) throw error;

            if (!data || data.length === 0) {
                document.getElementById('latest-articles').innerHTML = `
                    <div class="loading">まだ記事がありません。<br>ルナ・ジャスミンが最初の記事を執筆中です...</div>
                `;
                return;
            }

            let html = '<div class="articles-grid">';
            data.forEach(article => {
                const safeSlug = article.slug || `article-${article.id}`;
                const cleanContent = (article.content || '')
                    .replace(/[#*`\[\]()]/g, '')
                    .substring(0, 120) + '...';
                const date = new Date(article.published_at).toLocaleDateString('ja-JP', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });

                html += `
                    <div class="article-card">
                        <div class="card-meta">📅 ${date}</div>
                        <h3 class="card-title">${article.full_title}</h3>
                        <div class="card-content">${cleanContent}</div>
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
                            <div style="display: flex; align-items: center; gap: 8px; font-size: 0.85em; color: #666;">
                                <span>🌙</span>
                                <span>ルナ・ジャスミンが解説</span>
                            </div>
                            <button class="read-more-btn" onclick="showArticlePage('${safeSlug}')">
                                詳しく読む →
                            </button>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            
            document.getElementById('latest-articles').innerHTML = html;
            console.log('🎉 記事一覧表示完了');

        } catch (error) {
            console.error('❌ 記事一覧エラー:', error);
            document.getElementById('latest-articles').innerHTML = `
                <div class="error">
                    <h3>エラーが発生しました</h3>
                    <p>記事の読み込みに失敗しました。ページを再読み込みしてお試しください。</p>
                </div>
            `;
        }
    }

    // 記事詳細読み込み
    async function loadArticleDetail(slug) {
        try {
            console.log('📖 記事詳細を取得中:', slug);
            
            const decodedSlug = decodeURIComponent(slug);
            
            const { data, error } = await supabase
                .from('dream_articles')
                .select('*')
                .eq('slug', decodedSlug)
                .maybeSingle();

            if (error) throw error;

            if (!data) {
                document.getElementById('article-content-area').innerHTML = `
                    <div class="article-detail-box">
                        <div class="error">
                            <h3>記事が見つかりません</h3>
                            <p>指定された記事は存在しないか、削除された可能性があります。</p>
                        </div>
                        <button class="back-btn" onclick="showHomePage()">← トップページに戻る</button>
                    </div>
                `;
                return;
            }

            document.title = `${data.full_title} | Dream Meanings Global`;

            const date = new Date(data.published_at).toLocaleDateString('ja-JP', {
                year: 'numeric',
                month: 'long', 
                day: 'numeric'
            });

            const qualityScore = data.quality_score ? 
                `${Number(data.quality_score).toFixed(1)}/10` : '―';

            const htmlContent = marked.parse(data.content || '');

            document.getElementById('article-content-area').innerHTML = `
                <div class="article-detail-box">
                    <div class="article-badge">🌙 ルナ・ジャスミンが解説</div>
                    <h1 class="detail-title">${data.full_title}</h1>
                    <div class="detail-meta">
                        <span>📅 公開日: ${date}</span>
                        <span>⭐ 品質スコア: ${qualityScore}</span>
                    </div>
                    <div class="detail-body">${htmlContent}</div>
                    <button class="back-btn" onclick="showHomePage()">← 一覧に戻る</button>
                </div>
            `;

            loadRelatedArticles(data.id);
            console.log('🎉 記事詳細表示完了:', data.full_title);

        } catch (error) {
            console.error('❌ 記事詳細エラー:', error);
            document.getElementById('article-content-area').innerHTML = `
                <div class="article-detail-box">
                    <div class="error">
                        <h3>エラーが発生しました</h3>
                        <p>記事の読み込み中にエラーが発生しました。</p>
                    </div>
                    <button class="back-btn" onclick="showHomePage()">← トップページに戻る</button>
                </div>
            `;
        }
    }

    // 関連記事読み込み
    async function loadRelatedArticles(currentId) {
        try {
            const { data, error } = await supabase
                .from('dream_articles')
                .select('full_title, slug, published_at')
                .neq('id', currentId)
                .order('published_at', { ascending: false })
                .limit(4);

            if (error) throw error;

            if (!data || data.length === 0) {
                document.getElementById('related-grid').innerHTML = `
                    <p style="text-align: center; color: #777;">他の記事はまだありません。新しい記事をお楽しみに！</p>
                `;
                return;
            }

            let html = '';
            data.forEach(article => {
                const safeSlug = article.slug;
                const date = new Date(article.published_at).toLocaleDateString('ja-JP');

                html += `
                    <div class="article-card" 
                         style="cursor: pointer; min-height: auto;" 
                         onclick="showArticlePage('${safeSlug}')">
                        <h4 style="color: var(--primary-purple); margin: 0 0 10px 0; font-size: 1.1em;">
                            ${article.full_title}
                        </h4>
                        <span style="font-size: 0.8em; color: #888;">📅 ${date}</span>
                    </div>
                `;
            });

            document.getElementById('related-grid').innerHTML = html;
            console.log('🔮 関連記事表示完了:', data.length, '件');

        } catch (error) {
            console.error('⚠️ 関連記事エラー:', error);
        }
    }

    // ブラウザの戻る/進むボタン対応
    window.addEventListener('popstate', checkUrlAndShowPage);

    // 初期化
    document.addEventListener('DOMContentLoaded', checkUrlAndShowPage);
</script>

</body>
</html>
