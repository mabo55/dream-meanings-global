<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌙 ルナ・ジャスミンの夢占いサロン - 星と月が紐解く深層心理</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
   <style>
        :root {
            --primary-purple: #6B4C9A;
            --accent-green: #4CAF50;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --text-color: #333333;
            --bg-light: #F9F7FA;
        }
        
        * {
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-light);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.7;
        }
        
        header {
            background: var(--bg-gradient);
            color: white;
            text-align: center;
            padding: 40px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        header h1 {
            margin: 0;
            font-size: 2.5em;
            letter-spacing: 2px;
        }

        header p {
            font-size: 1.2em;
            opacity: 0.9;
            margin: 10px 0 0 0;
        }
        
        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .section-title {
            text-align: center;
            color: var(--primary-purple);
            font-size: 1.8em;
            margin-bottom: 30px;
            border-bottom: 3px solid var(--accent-green);
            display: inline-block;
            padding-bottom: 10px;
        }

        .articles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
        }
        
        .article-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            border-top: 4px solid var(--primary-purple);
            min-height: 280px;
        }
        
        .article-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }
        
        .article-title {
            color: var(--primary-purple);
            font-size: 1.3em;
            margin: 0 0 15px 0;
            line-height: 1.4;
            font-weight: bold;
        }
        
        .article-content {
            color: #555;
            font-size: 1em;
            flex-grow: 1;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .article-meta {
            font-size: 0.85em;
            color: #888;
            margin-bottom: 10px;
        }

        .article-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #eee;
            padding-top: 15px;
            margin-top: auto;
        }

        .author-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .mini-avatar {
            font-size: 1.2em;
            width: 32px;
            height: 32px;
            background: var(--bg-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .author-name {
            font-size: 0.9em;
            color: #666;
            font-weight: 500;
        }
        
        .read-more-btn {
            background: var(--bg-gradient);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-size: 0.9em;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 3px 10px rgba(0,0,0,0.15);
        }
        
        .read-more-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.25);
        }

        .loading, .error-message {
            text-align: center;
            padding: 60px 20px;
            font-size: 1.2em;
            color: var(--primary-purple);
        }

        .error-message {
            color: #e74c3c;
            background: #fdf2f2;
            border-radius: 10px;
            margin: 20px 0;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2em;
            }
            
            .articles-grid {
                grid-template-columns: 1fr;
            }
            
            .article-card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>🌙 Dream Meanings Global</h1>
    <p>AI占い師ルナ・ジャスミンが解き明かす、あなたの夢のメッセージ</p>
</header>

<div class="container">
    <div style="text-align: center;">
        <h2 class="section-title">✨ 最新の夢占いメッセージ</h2>
    </div>
    
    <div id="latest-articles">
        <div class="loading">🔮 ルナ・ジャスミンが夢の記録を読み込んでいます...</div>
    </div>
</div>

<script type="module">
    // Supabase設定（大江さんのプロジェクト情報）
    const SUPABASE_URL = 'https://qlxjgjgfdtfhaqkzsghi.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFseGpnamdmZHRmaGFxa3pzZ2hpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2OTg3MjIsImV4cCI6MjA5MDI3NDcyMn0.oNeOZpozQixlqMTGv_YFNqb4z9wcRzj7ibqfLXA-qKo';
    
    // Supabase クライアントの初期化
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function loadArticles() {
        try {
            console.log('📖 記事データを取得中...');

            // ✅ 重要：selectの中に 'slug' を必ず含める！
            const { data, error } = await supabase
                .from('dream_articles')
                .select('id, full_title, content, slug, published_at, topic_id')
                .order('published_at', { ascending: false })
                .limit(12);

            if (error) {
                console.error('❌ Supabaseエラー:', error);
                throw error;
            }

            console.log('✅ 取得成功:', data?.length, '件の記事');

            const articlesContainer = document.getElementById('latest-articles');

            if (!data || data.length === 0) {
                articlesContainer.innerHTML = `
                    <div class="loading">
                        まだ記事がありません。<br>
                        ルナ・ジャスミンが最初の記事を執筆中です...
                    </div>
                `;
                return;
            }

            // 記事カードのHTMLを生成
            let html = '<div class="articles-grid">';

            data.forEach((article, index) => {
                // Markdownの記号を除去して抜粋文を作成
                const rawContent = article.content || '';
                const cleanContent = rawContent
                    .replace(/#{1,6}\s/g, '')      // 見出し記号除去
                    .replace(/\*\*/g, '')          // 太字記号除去
                    .replace(/\*/g, '')            // イタリック記号除去
                    .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1') // リンク記号除去
                    .replace(/`/g, '')             // コード記号除去
                    .substring(0, 120) + '...';

                // slugの確認とフォールバック
                const articleSlug = article.slug || `article-${article.id}`;
                
                // ✅ 重要：日本語文字を安全なURL形式に変換
                const safeSlug = encodeURIComponent(articleSlug);

                // 公開日の整形
                const publishedDate = article.published_at 
                    ? new Date(article.published_at).toLocaleDateString('ja-JP', {
                        year: 'numeric',
                        month: 'long',
                        day: 'numeric'
                    })
                    : '';

                // デバッグ用ログ（問題解決後に削除可能）
                console.log(`📝 記事${index + 1}:`, {
                    title: article.full_title?.substring(0, 20) + '...',
                    originalSlug: article.slug,
                    safeSlug: safeSlug.substring(0, 30) + '...',
                    linkUrl: `article.html?slug=${safeSlug}`
                });

                html += `
                    <article class="article-card">
                        <div class="article-meta">📅 ${publishedDate}</div>
                        <h3 class="article-title">${article.full_title || 'タイトル未設定'}</h3>
                        <div class="article-content">
                            ${cleanContent}
                        </div>
                        <div class="article-footer">
                            <div class="author-info">
                                <div class="mini-avatar">🌙</div>
                                <span class="author-name">ルナ・ジャスミンが解説</span>
                            </div>
                            <a href="article.html?slug=${safeSlug}" 
                               class="read-more-btn"
                               onclick="console.log('🔗 リンククリック:', 'article.html?slug=${safeSlug}')">
                                詳しく読む →
                            </a>
                        </div>
                    </article>
                `;
            });

            html += '</div>';
            articlesContainer.innerHTML = html;

            console.log('🎉 記事一覧の表示完了');

        } catch (error) {
            console.error('💥 予期しないエラー:', error);
            document.getElementById('latest-articles').innerHTML = `
                <div class="error-message">
                    <h3>エラーが発生しました</h3>
                    <p>記事の読み込みに失敗しました。ページを再読み込みしてお試しください。</p>
                    <p style="font-size: 0.8em; color: #666;">
                        エラー詳細: ${error.message}
                    </p>
                </div>
            `;
        }
    }

    // ページ読み込み時に実行
    document.addEventListener('DOMContentLoaded', loadArticles);
</script>

</body>
</html>
