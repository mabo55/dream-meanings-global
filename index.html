<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌙 夢占い辞典 - あなたの夢が教えるメッセージ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            line-height: 1.6; color: #333; background: #f8f9fa;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; padding: 40px 0; text-align: center; 
        }
        h1 { font-size: 2.5em; margin-bottom: 10px; }
        .subtitle { font-size: 1.2em; opacity: 0.9; }
        .article-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); 
            gap: 30px; margin-top: 40px; 
        }
        .article-card { 
            background: white; border-radius: 12px; padding: 25px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
            transition: transform 0.3s;
        }
        .article-card:hover { transform: translateY(-5px); }
        .article-title { font-size: 1.4em; color: #2c3e50; margin-bottom: 15px; }
        .article-content { color: #555; line-height: 1.7; }
        .seichi-link { 
            background: linear-gradient(135deg, #74b9ff, #0984e3);
            color: white; padding: 20px; border-radius: 8px; margin-top: 20px;
        }
        .seichi-link a { color: white; text-decoration: none; font-weight: bold; }
        .loading { text-align: center; padding: 60px; font-size: 1.2em; color: #666; }
        .tag { 
            display: inline-block; background: #e74c3c; color: white;
            padding: 4px 12px; border-radius: 15px; font-size: 0.85em; margin-right: 8px;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>🌙 夢占い辞典</h1>
            <p class="subtitle">あなたの夢が教えてくれる深層心理とメッセージ</p>
        </div>
    </header>

    <div class="container">
        <div id="content" class="loading">
            🔮 夢の世界から記事を読み込み中...
        </div>
    </div>

   <script>
        // 👇 ここをStep1で取得した実際の値に書き換えてください
        const SUPABASE_URL = 'https://qlxjgjgfdtfhaqkzsghi.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFseGpnamdmZHRmaGFxa3pzZ2hpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2OTg3MjIsImV4cCI6MjA5MDI3NDcyMn0.oNeOZpozQixlqMTGv_YFNqb4z9wcRzj7ibqfLXA-qKo';
        
        // Supabaseクライアント初期化
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadDreamArticles() {
            try {
                // データベースから記事を取得
                const { data: articles, error } = await db
                    .from('dream_articles')
                    .select('*')
                    .order('published_at', { ascending: false })
                    .limit(12);

                if (error) throw error;

                const container = document.getElementById('content');
                
                // まだ記事が0件の場合（現在はこれが正常）
                if (!articles || articles.length === 0) {
                    container.innerHTML = `
                        <div class="article-grid">
                            <div class="article-card" style="text-align: center; grid-column: 1 / -1;">
                                <h2 class="article-title">✨ データベース接続成功！</h2>
                                <div class="article-content">
                                    <p style="font-size: 1.1em; color: #2c3e50;">
                                        夢占いサイトの基盤が完成しました！<br><br>
                                        現在、AIが新しい夢占い記事を執筆準備中です...<br>
                                        次のステップで自動記事生成システムを構築します。
                                    </p>
                                </div>
                            </div>
                        </div>`;
                    return;
                }

                // 記事がある場合の表示
                let html = '<div class="article-grid">';
                articles.forEach(article => {
                    html += `
                        <article class="article-card">
                            <h2 class="article-title">${article.full_title}</h2>
                            <div class="article-content">
                                ${article.content ? article.content.substring(0, 300) + '...' : '生成中...'}
                            </div>
                        </article>
                    `;
                });
                html += '</div>';
                container.innerHTML = html;
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('content').innerHTML = `
                    <div class="loading" style="color: #e74c3c;">
                        <h3>❌ データベース接続エラー</h3>
                        <p>URLとキーが正しいか確認してください。<br>
                        エラー詳細: ${error.message}</p>
                    </div>`;
            }
        }

        // ページ読み込み時に実行
        loadDreamArticles();
        
        // 5分ごとに新しい記事をチェック
        setInterval(loadDreamArticles, 300000);
    </script>
</html>
